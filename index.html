["España", "Portugal"], "campeon": "España", "subcampeon": "Portugal", "tercero": "Inglaterra", "bota_oro": "Mbappe", "bota_plata": "Kane", "bota_bronce": "Cristiano Ronaldo", "balon_oro": "Vitinha", "balon_plata": "Pedri", "balon_bronce": "Bellingham"}}, "cruces16": [["Sudáfrica", "Canadá"], ["Brasil", "Japón"], ["Alemania", "Paraguay"], ["Países Bajos", "Marruecos"], ["Costa de Marfil", "Noruega"], ["Francia", "Suecia"], ["México", "Ecuador"], ["Inglaterra", "Senegal"], ["Bélgica", "Argelia"], ["Estados Unidos", "Bosnia y Herzegovina"], ["España", "Austria"], ["Portugal", "Croacia"], ["Suiza", "RD Congo"], ["Australia", "Egipto"], ["Argentina", "Cabo Verde"], ["Colombia", "Ghana"]], "baremo": {"clas16": 4, "clas16_cuadro": 2, "clas8": 6, "clas8_cuadro": 3, "clas4": 10, "clas4_cuadro": 4, "clas2": 14, "clas2_cuadro": 6, "clas34": 14, "clas34_cuadro": 6, "clasF": 20, "clasF_cuadro": 10, "campeon": 25, "subcampeon": 12, "tercero": 8, "bota_oro": 10, "bota_plata": 8, "bota_bronce": 5, "balon_oro": 10, "balon_plata": 8, "balon_bronce": 5, "r16_signo": 3, "r16_exacto": 2, "r8_signo": 3, "r8_exacto": 3, "r4_signo": 4, "r4_exacto": 4, "rsemi_signo": 6, "rsemi_exacto": 6, "r34_signo": 5, "r34_exacto": 5, "rfinal_signo": 10, "rfinal_exacto": 10}};

    function ganador(p) {
      if (p.g1 === '' || p.g2 === '' || p.g1 == null || p.g2 == null) return null;
      const a = parseInt(p.g1), b = parseInt(p.g2);
      if (a > b) return 0; if (b > a) return 1;
      if (p.pen1 !== '' && p.pen2 !== '' && p.pen1 != null && p.pen2 != null) {
        const pa = parseInt(p.pen1), pb = parseInt(p.pen2);
        if (pa > pb) return 0; if (pb > pa) return 1;
      }
      return null;
    }

    function App() {
      const [r16, setR16] = useState(DATOS.cruces16.map(c => ({ e1: c[0], e2: c[1], g1: '', g2: '', pen1: '', pen2: '' })));
      const [r8, setR8] = useState(Array(8).fill(null).map(() => ({ g1:'',g2:'',pen1:'',pen2:'' })));
      const [r4, setR4] = useState(Array(4).fill(null).map(() => ({ g1:'',g2:'',pen1:'',pen2:'' })));
      const [rsemi, setRsemi] = useState(Array(2).fill(null).map(() => ({ g1:'',g2:'',pen1:'',pen2:'' })));
      const [r34, setR34] = useState([{ g1:'',g2:'',pen1:'',pen2:'' }]);
      const [rfinal, setRfinal] = useState([{ g1:'',g2:'',pen1:'',pen2:'' }]);
      const [honor, setHonor] = useState({ campeon:'', subcampeon:'', tercero:'', bota_oro:'', bota_plata:'', bota_bronce:'', balon_oro:'', balon_plata:'', balon_bronce:'' });
      const [tab, setTab] = useState('cuadro');

      const equiposR8 = useMemo(() => {
        return Array.from({length: 8}, (_, i) => {
          const w1 = ganador(r16[i*2]), w2 = ganador(r16[i*2+1]);
          return [w1!=null ? r16[i*2][['e1','e2'][w1]] : null, w2!=null ? r16[i*2+1][['e1','e2'][w2]] : null];
        });
      }, [r16]);

      const equiposR4 = useMemo(() => {
        return Array.from({length: 4}, (_, i) => {
          const w1 = ganador({...r8[i*2]}), w2 = ganador({...r8[i*2+1]});
          return [w1!=null ? equiposR8[i*2][w1] : null, w2!=null ? equiposR8[i*2+1][w2] : null];
        });
      }, [r8, equiposR8]);

      const equiposRsemi = useMemo(() => {
        return Array.from({length: 2}, (_, i) => {
          const w1 = ganador({...r4[i*2]}), w2 = ganador({...r4[i*2+1]});
          return [w1!=null ? equiposR4[i*2][w1] : null, w2!=null ? equiposR4[i*2+1][w2] : null];
        });
      }, [r4, equiposR4]);

      const equiposFinal = useMemo(() => {
        const w1 = ganador({...rsemi[0]}), w2 = ganador({...rsemi[1]});
        return {
          final: [w1!=null ? equiposRsemi[0][w1] : null, w2!=null ? equiposRsemi[1][w2] : null],
          tercer: [w1!=null ? equiposRsemi[0][1-w1] : null, w2!=null ? equiposRsemi[1][1-w2] : null]
        };
      }, [rsemi, equiposRsemi]);

      const clasificacion = useMemo(() => {
        const B = DATOS.baremo;
        const avanzanR16 = r16.flatMap(p => { const w=ganador(p); return w!=null ? [p[['e1','e2'][w]]] : []; });
        const avanzanR8 = equiposR8.flatMap((e,i) => { const w=ganador({...r8[i]}); return w!=null && e[w] ? [e[w]] : []; });
        const avanzanR4 = equiposR4.flatMap((e,i) => { const w=ganador({...r4[i]}); return w!=null && e[w] ? [e[w]] : []; });
        const avanzanSemi = equiposRsemi.flatMap((e,i) => { const w=ganador({...rsemi[i]}); return w!=null && e[w] ? [e[w]] : []; });

        const wF = ganador({...rfinal[0]});
        const campeonReal = wF!=null ? equiposFinal.final[wF] : null;
        const subcampeonReal = wF!=null ? equiposFinal.final[1-wF] : null;
        const w34 = ganador({...r34[0]});
        const terceroReal = w34!=null ? equiposFinal.tercer[w34] : null;

        const res = Object.entries(DATOS.puntos_grupos).map(([nombre, ptsGrupos]) => {
          const pr = DATOS.pronosticos[nombre];
          let pts = ptsGrupos;
          let desglose = { grupos: ptsGrupos, elim:0, honor:0 };
          if (!pr) return { nombre, pts, desglose };
          avanzanR16.forEach(eq => { if (pr.clas8?.includes(eq)) { pts += B.clas8; desglose.elim += B.clas8; } });
          avanzanR8.forEach(eq => { if (pr.clas4?.includes(eq)) { pts += B.clas4; desglose.elim += B.clas4; } });
          avanzanR4.forEach(eq => { if (pr.semis?.includes(eq)) { pts += B.clas2; desglose.elim += B.clas2; } });
          avanzanSemi.forEach(eq => { if (pr.final?.includes(eq)) { pts += B.clasF; desglose.elim += B.clasF; } });
          if (campeonReal && pr.campeon === campeonReal) { pts += B.campeon; desglose.honor += B.campeon; }
          if (subcampeonReal && pr.subcampeon === subcampeonReal) { pts += B.subcampeon; desglose.honor += B.subcampeon; }
          if (terceroReal && pr.tercero === terceroReal) { pts += B.tercero; desglose.honor += B.tercero; }
          ['bota_oro','bota_plata','bota_bronce','balon_oro','balon_plata','balon_bronce'].forEach(k => {
            if (honor[k] && pr[k] && pr[k].toLowerCase().trim() === honor[k].toLowerCase().trim()) {
              pts += B[k]; desglose.honor += B[k];
            }
          });
          return { nombre, pts, desglose };
        });
        return res.sort((a,b) => b.pts - a.pts);
      }, [r16, r8, r4, rsemi, r34, rfinal, honor, equiposR8, equiposR4, equiposRsemi, equiposFinal]);

      const baseGrupos = useMemo(() => Object.entries(DATOS.puntos_grupos).sort((a,b)=>b[1]-a[1]).map(x=>x[0]), []);

      const upd = (setter, arr, i, campo, val) => { const n=[...arr]; n[i]={...n[i],[campo]:val}; setter(n); };

      return (
        <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:'#0a1020',color:'#e8eef7',minHeight:'100vh'}}>
          <header style={{background:'linear-gradient(135deg,#0f1d3d,#122a52)',padding:'18px 24px',borderBottom:'2px solid #1e3a6b'}}>

              <span style={{fontSize:38}}>🏆</span>
              <div>
                <h1 style={{margin:0,fontSize:26,letterSpacing:1,color:'#FFD700',fontWeight:800}}>PORRA MUNDIAL 2026</h1>
                <p style={{margin:'2px 0 0',fontSize:13,color:'#8fa6c4'}}>Cuadro de eliminatorias · clasificación en vivo · simulador</p>
              </div>
            </div>
            <nav style={{display:'flex',gap:8,marginTop:16,flexWrap:'wrap'}}>
              {[['cuadro','⚽ Cuadro'],['honor','🏅 Cuadro de honor'],['clas','📊 Clasificación']].map(([id,txt]) => (
                <button key={id} onClick={()=>setTab(id)} style={{background:tab===id?'#FFD700':'#14213f',color:tab===id?'#0a1020':'#9fb3d1',border:'1px solid '+(tab===id?'#FFD700':'#243d68'),padding:'8px 18px',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:600,transition:'all .2s'}}>{txt}</button>
              ))}
            </nav>
          </header>

          <div style={{display:'flex',alignItems:'flex-start'}}>
            <main style={{flex:1,padding:20,overflowX:'auto',minWidth:0}}>
              {tab==='cuadro' && (
                <div style={{display:'flex',gap:16,minWidth:'max-content'}}>
                  <RondaCol titulo="Dieciseisavos" partidos={r16} equipos={r16.map(p=>[p.e1,p.e2])} onUpd={(i,c,v)=>upd(setR16,r16,i,c,v)} />
                  <RondaCol titulo="Octavos" partidos={r8} equipos={equiposR8} onUpd={(i,c,v)=>upd(setR8,r8,i,c,v)} />
                  <RondaCol titulo="Cuartos" partidos={r4} equipos={equiposR4} onUpd={(i,c,v)=>upd(setR4,r4,i,c,v)} />
                  <RondaCol titulo="Semifinales" partidos={rsemi} equipos={equiposRsemi} onUpd={(i,c,v)=>upd(setRsemi,rsemi,i,c,v)} />
                  <RondaCol titulo="Final" partidos={rfinal} equipos={[equiposFinal.final]} onUpd={(i,c,v)=>upd(setRfinal,rfinal,i,c,v)} esFinal />
                </div>
              )}
              {tab==='honor' && (
                <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
                  <div style={{background:'#0d1730',border:'1px solid #243d68',borderRadius:10,padding:18,minWidth:280}}>
                    <h3 style={{fontSize:13,color:'#FFD700',textTransform:'uppercase',letterSpacing:1,textAlign:'center',margin:'0 0 12px'}}>Final</h3>
                    <Partido p={rfinal[0]} e1={equiposFinal.final[0]} e2={equiposFinal.final[1]} onUpd={(c,v)=>{const n=[...rfinal];n[0]={...n[0],[c]:v};setRfinal(n);}} esFinal />
                    <h3 style={{fontSize:13,color:'#FFD700',textTransform:'uppercase',letterSpacing:1,textAlign:'center',margin:'20px 0 12px'}}>3er y 4º puesto</h3>
                    <Partido p={r34[0]} e1={equiposFinal.tercer[0]} e2={equiposFinal.tercer[1]} onUpd={(c,v)=>{const n=[...r34];n[0]={...n[0],[c]:v};setR34(n);}} />
                  </div>
                  <div style={{background:'#0d1730',border:'1px solid #243d68',borderRadius:10,padding:18,minWidth:300}}>
                    <h3 style={{fontSize:13,color:'#FFD700',textTransform:'uppercase',letterSpacing:1,textAlign:'center',margin:'0 0 16px'}}>Botas y Balones</h3>
                    {[['bota_oro','👟 Bota de Oro'],['bota_plata','👟 Bota de Plata'],['bota_bronce','👟 Bota de Bronce'],['balon_oro','🏅 Balón de Oro'],['balon_plata','🏅 Balón de Plata'],['balon_bronce','🏅 Balón de Bronce']].map(([k,lbl])=>(
                      <div key={k} style={{display:'flex',flexDirection:'column',gap:4,marginBottom:12}}>
                        <label style={{fontSize:12,color:'#9fb3d1',fontWeight:600}}>{lbl}</label>
                        <input style={{background:'#0a1020',border:'1px solid #34507f',borderRadius:6,padding:'8px 10px',color:'#fff',fontSize:14}} value={honor[k]} onChange={e=>setHonor({...honor,[k]:e.target.value})} placeholder="Nombre jugador" />
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {tab==='clas' && (
                <div style={{background:'#0d1730',borderRadius:10,padding:4,overflow:'hidden'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:14}}>
                    <thead><tr>
                      {['#','Participante','Grupos','Elim.','Honor','Total','Mov.'].map((h,i)=>(
                        <th key={i} style={{background:'#16284d',color:'#FFD700',padding:'10px 8px',fontSize:12,textTransform:'uppercase',letterSpacing:.5,textAlign:i===1?'left':'center'}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {clasificacion.map((c,i) => {
                        const delta = baseGrupos.indexOf(c.nombre) - i;
                        return (
                          <tr key={c.nombre} style={{background:i<3?'linear-gradient(90deg,#3a2e0022,transparent)':''}}>
                            <td style={{padding:'8px',textAlign:'center',borderBottom:'1px solid #1a2845'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
                            <td style={{padding:'8px',textAlign:'left',borderBottom:'1px solid #1a2845',fontWeight:600}}>{c.nombre}</td>
                            <td style={{padding:'8px',textAlign:'center',borderBottom:'1px solid #1a2845',color:'#8fa6c4',fontSize:13}}>{c.desglose.grupos}</td>
                            <td style={{padding:'8px',textAlign:'center',borderBottom:'1px solid #1a2845',color:'#8fa6c4',fontSize:13}}>{c.desglose.elim||'—'}</td>
                            <td style={{padding:'8px',textAlign:'center',borderBottom:'1px solid #1a2845',color:'#8fa6c4',fontSize:13}}>{c.desglose.honor||'—'}</td>
                            <td style={{padding:'8px',textAlign:'center',borderBottom:'1px solid #1a2845',color:'#FFD700',fontWeight:800,fontSize:15}}>{c.pts}</td>
                            <td style={{padding:'8px',textAlign:'center',borderBottom:'1px solid #1a2845'}}>{delta!==0&&<span style={{color:delta>0?'#4ade80':'#f87171',fontSize:12}}>{delta>0?'▲':'▼'}{Math.abs(delta)}</span>}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </main>
            <aside style={{width:260,background:'#0d1730',borderLeft:'1px solid #1e3a6b',padding:16,position:'sticky',top:0,minHeight:'100vh',flexShrink:0}}>
              <h2 style={{fontSize:14,color:'#FFD700',margin:'0 0 12px',textTransform:'uppercase',letterSpacing:.5}}>Clasificación en vivo</h2>
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                {clasificacion.map((c,i) => {
                  const delta = baseGrupos.indexOf(c.nombre) - i;
                  return (
                    <div key={c.nombre} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 6px',borderRadius:6,fontSize:12.5,background:i<3?'linear-gradient(90deg,#3a2e0033,transparent)':''}}>
                      <span style={{width:20,color:'#7e93b3',fontWeight:700,textAlign:'center',flexShrink:0}}>{i+1}</span>
                      <span style={{flex:1,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.nombre}</span>
                      {delta!==0&&<span style={{color:delta>0?'#4ade80':'#f87171',fontSize:10,fontWeight:700,flexShrink:0}}>{delta>0?'▲':'▼'}{Math.abs(delta)}</span>}
                      <span style={{color:'#FFD700',fontWeight:700,minWidth:28,textAlign:'right',flexShrink:0}}>{c.pts}</span>
                    </div>
                  );
                })}
              </div>
            </aside>
          </div>

          <footer style={{padding:'14px 24px',fontSize:12,color:'#7e93b3',borderTop:'1px solid #1e3a6b',textAlign:'center'}}>
            Mete los resultados en el cuadro y la clasificación se recalcula sola. Empate → rellena penaltis.&nbsp;
            <span style={{color:'#f0a020'}}>Puntúa: equipos clasificados a cada ronda (6/10/14/20), campeón (25), subcampeón (12), 3º (8), botas y balones (10/8/5).</span>
          </footer>
        </div>
      );
    }

    function RondaCol({ titulo, partidos, equipos, onUpd, esFinal }) {
      return (
        <div style={{display:'flex',flexDirection:'column',justifyContent:'space-around',minWidth:180,gap:10}}>
          <h3 style={{fontSize:13,color:'#FFD700',textTransform:'uppercase',letterSpacing:1,textAlign:'center',margin:'0 0 8px'}}>{titulo}</h3>
          {partidos.map((p,i) => (
            <Partido key={i} p={p} e1={equipos[i]?.[0]} e2={equipos[i]?.[1]} onUpd={(c,v)=>onUpd(i,c,v)} esFinal={esFinal} />
          ))}
        </div>
      );
    }

    function Partido({ p, e1, e2, onUpd, esFinal }) {
      const empate = p.g1!=='' && p.g2!=='' && p.g1===p.g2;
      const listo = e1 && e2;
      return (
        <div style={{background:'#13203c',border:'2px solid '+(esFinal?'#FFD700':'#243d68'),borderRadius:8,padding:8,display:'flex',flexDirection:'column',gap:4,opacity:listo?1:0.45}}>
          {[[e1,'g1','pen1'],[e2,'g2','pen2']].map(([eq,gk,pk],idx) => (
            <div key={idx} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
              <span style={{fontSize:12.5,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:120}}>{eq||'—'}</span>
              <input style={{width:30,height:28,textAlign:'center',background:'#0a1020',border:'1px solid #34507f',borderRadius:5,color:'#fff',fontSize:15,fontWeight:700}} value={p[gk]} onChange={e=>onUpd(gk,e.target.value.replace(/[^0-9]/g,''))} disabled={!listo} maxLength={2} />
            </div>
          ))}
          {empate && listo && (
            <div style={{display:'flex',alignItems:'center',gap:4,justifyContent:'flex-end',marginTop:2}}>
              <span style={{fontSize:10,color:'#f0a020',marginRight:'auto'}}>Penaltis</span>
              <input style={{width:24,height:22,textAlign:'center',background:'#0a1020',border:'1px solid #5a4a20',borderRadius:4,color:'#f0c040',fontSize:12}} value={p.pen1} onChange={e=>onUpd('pen1',e.target.value.replace(/[^0-9]/g,''))} maxLength={2} />
              <span style={{color:'#7e93b3'}}>-</span>
              <input style={{width:24,height:22,textAlign:'center',background:'#0a1020',border:'1px solid #5a4a20',borderRadius:4,color:'#f0c040',fontSize:12}} value={p.pen2} onChange={e=>onUpd('pen2',e.target.value.replace(/[^0-9]/g,''))} maxLength={2} />
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
